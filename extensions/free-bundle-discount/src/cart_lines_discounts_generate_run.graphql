query CartInput {
  cart {
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
  shop {
    metafield(namespace: "custom", key: "bundle_config") {
      jsonValue
    }
  }
}
